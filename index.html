<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseVersive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <div class="museum-logo">
                <span class="logo-deco">✦</span>
                <span class="logo-title">MuseVersive</span>
                <span class="logo-deco">✦</span>
            </div>
            <p class="museum-subtitle">Une expérience artistique immersive</p>

            <div class="separator">
                <span class="sep-line"></span>
                <span class="sep-icon">🎨</span>
                <span class="sep-line"></span>
            </div>

            <div class="controls-grid">
                <div class="control-row">
                    <div class="key-group">
                        <span class="key">Z</span>
                    </div>
                    <span class="control-label">Avancer</span>
                </div>
                <div class="control-row">
                    <div class="key-group">
                        <span class="key">Q</span>
                        <span class="key">S</span>
                        <span class="key">D</span>
                    </div>
                    <span class="control-label">Gauche · Reculer · Droite</span>
                </div>
                <div class="control-row">
                    <div class="key-group">
                        <span class="key wide">🖱 Souris</span>
                    </div>
                    <span class="control-label">Regarder autour</span>
                </div>
                <div class="control-row">
                    <div class="key-group">
                        <span class="key">F</span>
                    </div>
                    <span class="control-label">Regarder un tableau</span>
                </div>
                <div class="control-row">
                    <div class="key-group">
                        <span class="key key-gold">E</span>
                    </div>
                    <span class="control-label">Entrer dans une toile</span>
                </div>
                <div class="control-row">
                    <div class="key-group">
                        <span class="key wide">⌫ Retour</span>
                    </div>
                    <span class="control-label">Sortir d'une toile</span>
                </div>
                <div class="control-row">
                    <div class="key-group">
                        <span class="key wide">Échap</span>
                    </div>
                    <span class="control-label">Pause</span>
                </div>
            </div>

            <div class="separator">
                <span class="sep-line"></span>
            </div>

            <button id="enter-btn">
                <span class="btn-icon">▶</span>
                Entrer dans le musée
            </button>

            <p class="enter-hint">Cliquez pour capturer la souris</p>
        </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
        }
      }
    </script>

    <script type="module" src="js/main.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Mode hors-ligne (PWA) activé !'))
                .catch(err => console.warn('Erreur PWA:', err));
            });
        }
    </script>

    <div id="joystick-zone" style="position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; display: none; z-index: 20;"></div>

</body>
</html>
